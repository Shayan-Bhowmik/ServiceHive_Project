version: '3.9'

services:
  mongo:
    image: mongo:6
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart_leads_dashboard

  server:
    build:
      context: ./server
    container_name: smart-leads-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/smart-leads-dashboard
      CLIENT_URL: http://localhost:3000

  client:
    build:
      context: ./client
    container_name: smart-leads-client
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000/api

volumes:
  mongo_data:
